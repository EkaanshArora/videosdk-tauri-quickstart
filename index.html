<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zoom Video SDK Quickstart</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <main id="join-screen" class="join-screen">
      <form id="join-form" class="join-card">
        <div>
          <p class="eyebrow">Zoom Video SDK</p>
          <h1>Join a session</h1>
          <p class="help">The first person to join creates the session.</p>
        </div>

        <label>Session name<input name="sessionName" required autocomplete="off" /></label>
        <label>Your name<input name="userName" required autocomplete="name" /></label>
        <label>Password <span>(optional)</span><input name="password" type="password" /></label>
        <label>JWT<textarea name="token" required rows="4" spellcheck="false"></textarea></label>
        <p id="error-message" class="error" aria-live="polite"></p>
        <button id="join-button" class="primary" type="submit">Join session</button>
      </form>
    </main>

    <main id="session-screen" class="session-screen" hidden>
      <header><strong id="session-title"></strong><span>Zoom Video SDK</span></header>
      <section id="video-grid" class="video-grid" aria-label="Session participants"></section>
      <footer>
        <button id="audio-button">Mute</button>
        <button id="video-button">Stop video</button>
        <button id="leave-button" class="danger">Leave</button>
      </footer>
    </main>
  </body>
</html>
